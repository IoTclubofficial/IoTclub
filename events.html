<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Events</title>
<link rel="stylesheet" href="style.css">

<style>
    body {
        margin: 0;
        font-family: 'Poppins', sans-serif;
        background: radial-gradient(circle at top, #0b1c2c, #05070d);
        padding-top: 80px;
        color: white;
    }

    /* NAVBAR */
    nav {
        position: fixed;
        top: 0;
        width: 100%;
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 15px 40px;
        background: rgba(0,0,0,0.4);
        backdrop-filter: blur(10px);
        z-index: 1000;
    }

    nav h1 {
        color: #00f7ff;
        letter-spacing: 2px;
    }

    nav button {
        padding: 8px 18px;
        border-radius: 20px;
        border: none;
        background: linear-gradient(90deg,#00f7ff,#8a2be2);
        color: white;
        cursor: pointer;
        transition: 0.3s;
    }

    nav button:hover {
        transform: scale(1.05);
        box-shadow: 0 0 10px #00f7ff;
    }

    /* SECTION */
    .section {
        text-align: center;
        padding: 100px 20px 40px;
    }

    .section h2 {
        font-size: 42px;
        font-weight: 800;
        letter-spacing: 2px;
        text-transform: uppercase;
        background: linear-gradient(90deg,#00f7ff,#8a2be2);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        text-shadow: 0 0 25px rgba(0,247,255,0.7);
        margin-bottom: 10px;
        animation: fadeDown 1s ease;
    }

    .section p {
        font-size: 18px;
        color: #ccc;
        letter-spacing: 1px;
        position: relative;
        display: inline-block;
        animation: fadeUp 1s ease;
    }

    .section p::after {
        content: "";
        display: block;
        height: 3px;
        width: 60%;
        margin: 8px auto 0;
        background: linear-gradient(90deg,#00f7ff,#8a2be2);
        border-radius: 5px;
    }

    /* CARDS */
    .cards {
        display: flex;
        justify-content: center;
        gap: 40px;
        flex-wrap: wrap;
        padding: 20px;
    }

    .card {
        background: rgba(255,255,255,0.05);
        backdrop-filter: blur(12px);
        border-radius: 20px;
        padding: 20px;
        width: 260px;
        text-align: center;
        transition: 0.4s;
        cursor: pointer;
    }

    .card:hover {
        transform: translateY(-10px) scale(1.03);
        box-shadow: 0 0 25px rgba(0,247,255,0.3);
    }

    .event-img {
        width: 100%;
        border-radius: 15px;
        margin-bottom: 15px;
    }

    .card h3 {
        margin: 10px 0;
    }

    .card p {
        color: #aaa;
        margin: 5px 0;
    }

    /* ANIMATIONS */
    @keyframes fadeDown {
        from { opacity: 0; transform: translateY(-25px); }
        to { opacity: 1; transform: translateY(0); }
    }

    @keyframes fadeUp {
        from { opacity: 0; transform: translateY(25px); }
        to { opacity: 1; transform: translateY(0); }
    }
</style>
</head>

<body>

<canvas id="bg"></canvas>

<nav>
    <h1>IOTIFY</h1>
    <button onclick="goHome()">Home</button>
</nav>

<section class="section">
    <h2>Our Events</h2>
    <p>Click below the event to dive in</p>
</section>

<div class="cards">

    <div class="card event-card" onclick="openEvent('event1.html')">
        <img src="poster.png" class="event-img">
        <h3>2 Days Embedded Workshop</h3>
        <p>Completed</p>
    </div>

    <div class="card event-card" onclick="openEvent('event2.html')">
        <img src="Nexora_poster.jpeg" class="event-img">
        <h3>NEXORA 1.0</h3>
        <p>April 30</p>
        <p>Upcoming</p>
    </div>

</div>

<script src="script.js"></script>

</body>
</html>
