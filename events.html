<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Events</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<canvas id="bg"></canvas>

<nav>
    <h1>IOTIFY</h1>
    <button onclick="goHome()">Home</button>
</nav>

<section class="section" style="text-align: center; padding: 40px 20px;">
    
    <h2 style="
        font-size: 42px; 
        font-weight: 800; 
        letter-spacing: 2px; 
        text-transform: uppercase; 
        background: linear-gradient(90deg,#00f7ff,#8a2be2); 
        -webkit-background-clip: text; 
        -webkit-text-fill-color: transparent; 
        text-shadow: 0 0 20px rgba(0,247,255,0.6);
        margin-bottom: 10px;">
        Our Events
    </h2>

    <h3 style="
        font-size: 18px;
        font-weight: 500;
        color: #cccccc;
        letter-spacing: 1px;
        margin-top: 10px;
        position: relative;
        display: inline-block;">
        
        Click below the event to dive in
        
        <span style="
            display: block;
            height: 3px;
            width: 60%;
            margin: 8px auto 0;
            background: linear-gradient(90deg,#00f7ff,#8a2be2);
            border-radius: 5px;">
        </span>
    </h3>

</section>

    <div class="cards">

        <div class="card event-card" onclick="openEvent('event1.html')">
            <img src="poster.png" class="event-img">
            <h3>2 Days Embedded Workshop</h3>
            <p>Completed</p>
        </div>

        <div class="card event-card" onclick="openEvent('event2.html')">
            <img src="Nexora_poster.jpeg" class="event-img">
            <h3>NEXORA 1.0</h3>
            <p>April 30</p>
            <p>Upcoming</p>
        </div>

    </div>
</section>

<script src="script.js"></script>
</body>
</html>
