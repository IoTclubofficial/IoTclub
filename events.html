<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Events</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<canvas id="bg"></canvas>

<nav>
    <h1>IOTIFY</h1>
    <button onclick="goHome()">Home</button>
</nav>

<section class="section">

    <style>
        body {
            margin: 0;
            padding-top: 80px; /* prevents top cut (navbar fix) */
            font-family: 'Poppins', sans-serif;
            background: radial-gradient(circle at top, #0b1c2c, #05070d);
        }

        .section {
            text-align: center;
            padding: 100px 20px 50px;
        }

        .section h2 {
            font-size: 42px;
            font-weight: 800;
            letter-spacing: 2px;
            text-transform: uppercase;
            background: linear-gradient(90deg,#00f7ff,#8a2be2);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 0 25px rgba(0,247,255,0.7);
            margin-bottom: 10px;
            animation: fadeDown 1s ease;
        }

        .section h3 {
            font-size: 18px;
            font-weight: 500;
            color: #cccccc;
            letter-spacing: 1px;
            display: inline-block;
            position: relative;
            animation: fadeUp 1s ease;
        }

        .section h3::after {
            content: "";
            display: block;
            height: 3px;
            width: 60%;
            margin: 8px auto 0;
            background: linear-gradient(90deg,#00f7ff,#8a2be2);
            border-radius: 5px;
        }

        /* animations */
        @keyframes fadeDown {
            from {
                opacity: 0;
                transform: translateY(-25px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeUp {
            from {
                opacity: 0;
                transform: translateY(25px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>

    <h2>Our Events</h2>
    <h3>Click below the event to dive in</h3>

</section>

    <div class="cards">

        <div class="card event-card" onclick="openEvent('event1.html')">
            <img src="poster.png" class="event-img">
            <h3>2 Days Embedded Workshop</h3>
            <p>Completed</p>
        </div>

        <div class="card event-card" onclick="openEvent('event2.html')">
            <img src="Nexora_poster.jpeg" class="event-img">
            <h3>NEXORA 1.0</h3>
            <p>April 30</p>
            <p>Upcoming</p>
        </div>

    </div>
</section>

<script src="script.js"></script>
</body>
</html>
